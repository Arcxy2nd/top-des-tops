<!DOCTYPE html>
<html lang="fr">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #0f111a; --panel: #1e2130; --text: #e0e6ed; --accent: #ff4757; --success: #2ed573; --error: #ff4757; --btn-alt: #353b48; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
    .card { background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #2f3640; }
    h2 { margin-top: 0; border-bottom: 2px solid #2f3640; padding-bottom: 12px; font-size: 1.4rem; color: #fff; }
    h3 { font-size: 1.1rem; color: #a4b0be; }
    .form-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
    select, input, button { padding: 12px; border-radius: 6px; border: 1px solid #353b48; background: #2f3640; color: var(--text); flex: 1; min-width: 150px; font-size: 1rem; }
    select:focus, input:focus { outline: 2px solid var(--accent); }
    .number-group { display: flex; gap: 10px; flex: 1; min-width: 200px; }
    .number-group label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #a4b0be; }
    button { font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
    button.primary { background: var(--accent); color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    button.primary:hover { opacity: 0.9; transform: translateY(-2px); }
    button.secondary { background: #3742fa; color: #fff; text-transform: uppercase; }
    button.secondary:hover { opacity: 0.9; }
    button.small { padding: 6px 12px; font-size: 0.85rem; flex: none; min-width: auto; background: var(--btn-alt); }
    button.small:hover { background: #57606f; }
    .alert { padding: 12px; border-radius: 6px; display: none; margin-bottom: 15px; font-weight: 500; }
    .alert.error { background: rgba(255, 71, 87, 0.1); color: var(--error); border: 1px solid var(--error); display: block; }
    .alert.success { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid var(--success); display: block; }
    .report-box { background: #000; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; line-height: 1.6; color: #00d4aa; border: 1px solid #2f3640; }
    .filters { display: flex; gap: 15px; margin-bottom: 25px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .entity-list { list-style: none; padding: 0; margin: 0 0 15px 0; }
    .entity-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2f3640; }
    .btn-container { display: flex; gap: 15px; margin-top: 20px; }
    
    /* GESTION DE L'IMPRESSION (STYLE WALKFORWARD PDF AUTOMATIQUE) */
    @media print {
      body { background: #ffffff !important; color: #000000 !important; padding: 0; }
      .card { background: #ffffff !important; border: none !important; box-shadow: none !important; padding: 10px; margin: 0; }
      .form-group, .filters, h2, h3, button, .settings-grid, input, select { display: none !important; }
      .container { max-width: 100%; }
      .report-box { background: #f5f6fa !important; color: #2f3542 !important; border: 1px solid #ced6e0 !important; }
      canvas { max-height: 300px !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <h2>Ajout d'une Infraction</h2>
      <div id="injectAlert"></div>
      <div class="form-group">
        <select id="playerInput"><option>Chargement...</option></select>
        <select id="categoryInput"><option>Chargement...</option></select>
        <input type="datetime-local" id="dateInput">
      </div>
      <div class="form-group">
        <div class="number-group">
          <label>Valeur :
            <select id="pointsInput">
              <option value="1">1 Point</option><option value="3">3 Points</option><option value="5">5 Points</option><option value="10">10 Points</option>
            </select>
          </label>
          <label>Fois : <input type="number" id="timesInput" value="1" min="1"></label>
        </div>
        <button class="primary" onclick="submitData()" id="submitBtn">Ajouter</button>
      </div>
    </div>

    <div class="card">
      <h2>Analyses Temporelles & Classements</h2>
      <div class="filters">
        <select id="yearFilter" onchange="fetchAnalytics()">
          <option value="All">Toutes les années</option><option value="2026" selected>2026</option><option value="2025">2025</option>
        </select>
        <select id="monthFilter" onchange="fetchAnalytics()">
          <option value="All" selected>Tous les mois</option><option value="0">Janvier</option><option value="1">Février</option>
          <option value="2">Mars</option><option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
          <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
        </select>
      </div>
      <div style="height: 380px; position: relative;"><canvas id="mainChart"></canvas></div>
    </div>

    <div class="card">
      <h2>Gestion de la Matrice des Profils</h2>
      <div id="settingsAlert"></div>
      <div class="settings-grid">
        <div>
          <h3>Joueurs</h3>
          <ul class="entity-list" id="playersList"></ul>
          <div class="form-group">
            <input type="text" id="newPlayerName" placeholder="Nouveau Joueur">
            <button class="primary small" onclick="manageEntity('ADD', 'Players', 'newPlayerName')">Ajouter</button>
          </div>
        </div>
        <div>
          <h3>Catégories</h3>
          <ul class="entity-list" id="categoriesList"></ul>
          <div class="form-group">
            <input type="text" id="newCategoryName" placeholder="Nouvelle Catégorie">
            <button class="primary small" onclick="manageEntity('ADD', 'Categories', 'newCategoryName')">Ajouter</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Générateur de Rapports & Exportations</h2>
      <div class="report-box" id="reportOutput">Génération de l'analyse en cours...</div>
      <div class="btn-container">
        <button class="primary" onclick="exportHtmlReport()">Exporter en HTML Autonome</button>
        <button class="secondary" onclick="window.print()">Imprimer / Sauvegarder en PDF</button>
      </div>
    </div>

  </div>

  <script>
    let currentChart = null;

    function initApp() { fetchSettings(); fetchAnalytics(); }
    function showAlert(id, msg, type) { const el = document.getElementById(id); el.className = 'alert ' + type; el.innerText = msg; setTimeout(() => { el.className = 'alert'; }, 5000); }
    
    function fetchSettings() {
      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          populateDropdown('playerInput', res.players); populateDropdown('categoryInput', res.categories);
          renderList('playersList', 'Players', res.players); renderList('categoriesList', 'Categories', res.categories);
        } else { showAlert('settingsAlert', res.error, 'error'); }
      }).apiGetSettings();
    }
    
    function populateDropdown(id, items) { document.getElementById(id).innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join(''); }
    function renderList(id, type, items) {
      document.getElementById(id).innerHTML = items.map(i => `
        <li class="entity-item"><span>${i}</span>
          <div><button class="small" onclick="promptRename('${type}', '${i}')">Éditer</button>
          <button class="small" style="background:#ff4757;" onclick="manageEntity('DELETE', '${type}', null, '${i}')">Suppr</button></div>
        </li>`).join('');
    }

    function manageEntity(act, type, inputId, nameRef) {
      const name = nameRef || document.getElementById(inputId).value.trim(); if (!name) return;
      let newName = (act === 'RENAME') ? prompt(`Nouveau nom pour ${name} :`) : null;
      if (act === 'RENAME' && !newName) return;
      if (act === 'DELETE' && !confirm(`Confirmer la suppression ?`)) return;

      google.script.run.withSuccessHandler(res => {
        if (res.success) { if (inputId) document.getElementById(inputId).value = ''; fetchSettings(); fetchAnalytics(); }
        else { showAlert('settingsAlert', res.error, 'error'); }
      }).apiManageEntity(act, type, name, newName);
    }
    function promptRename(t, n) { manageEntity('RENAME', t, null, n); }

    function submitData() {
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Calcul..."; btn.disabled = true;
      google.script.run.withSuccessHandler(res => {
        btn.innerText = "Ajouter"; btn.disabled = false;
        if (res.success) { document.getElementById('dateInput').value = ''; document.getElementById('timesInput').value = '1'; fetchAnalytics(); }
        else { showAlert('injectAlert', res.error, 'error'); }
      }).apiAddScore(document.getElementById('playerInput').value, document.getElementById('categoryInput').value, document.getElementById('dateInput').value, document.getElementById('pointsInput').value, document.getElementById('timesInput').value);
    }

    function fetchAnalytics() {
      google.script.run.withSuccessHandler(res => { if (res.success) renderDashboard(res.data); }).apiGetData(document.getElementById('yearFilter').value, document.getElementById('monthFilter').value);
    }

    function renderDashboard(data) {
      document.getElementById('reportOutput').innerText = data.insights;
      const players = Object.keys(data.scores);
      const datasets = data.categories.map((cat, i) => {
        const colors = ['#ff4757', '#3742fa', '#2ed573', '#ffa502', '#eccc68', '#9b59b6'];
        return { label: cat, data: players.map(p => data.scores[p][cat] || 0), backgroundColor: colors[i % colors.length], borderRadius: 4 };
      });
      const ctx = document.getElementById('mainChart').getContext('2d');
      if (currentChart) currentChart.destroy();
      currentChart = new Chart(ctx, {
        type: 'bar', data: { labels: players, datasets: datasets },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: { color: '#2f3640' } }, y: { stacked: true, grid: { color: '#2f3640' } } } }
      });
    }

    function exportHtmlReport() {
      const y = document.getElementById('yearFilter').value;
      const m = document.getElementById('monthFilter').value;
      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          const blob = new Blob([res.html], { type: 'text/html' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `Rapport_Casseroles_${m}_${y}.html`;
          link.click();
        }
      }).apiDownloadHtmlReport(y, m);
    }

    window.onload = initApp;
  </script>
</body>
</html>
