<!DOCTYPE html>
<html lang="fr">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #0f111a; --panel: #1e2130; --text: #e0e6ed; --accent: #ff4757; --success: #2ed573; --error: #ff4757; --btn-alt: #353b48; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
    .card { background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #2f3640; }
    h2 { margin-top: 0; border-bottom: 2px solid #2f3640; padding-bottom: 12px; font-size: 1.4rem; color: #fff; }
    h3 { font-size: 1.1rem; color: #a4b0be; }
    .form-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
    select, input, button { padding: 12px; border-radius: 6px; border: 1px solid #353b48; background: #2f3640; color: var(--text); flex: 1; min-width: 150px; font-size: 1rem; }
    select:focus, input:focus { outline: 2px solid var(--accent); }
    button { font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
    button.primary { background: var(--accent); color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    button.primary:hover { opacity: 0.9; transform: translateY(-2px); }
    button.small { padding: 6px 12px; font-size: 0.85rem; flex: none; min-width: auto; background: var(--btn-alt); }
    button.small:hover { background: #57606f; }
    .alert { padding: 12px; border-radius: 6px; display: none; margin-bottom: 15px; font-weight: 500; }
    .alert.error { background: rgba(255, 71, 87, 0.1); color: var(--error); border: 1px solid var(--error); display: block; }
    .alert.success { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid var(--success); display: block; }
    .report-box { background: #000; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; line-height: 1.6; color: #7bed9f; border: 1px solid #2f3640; }
    .filters { display: flex; gap: 15px; margin-bottom: 25px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .entity-list { list-style: none; padding: 0; margin: 0 0 15px 0; }
    .entity-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2f3640; }
    .entity-actions { display: flex; gap: 5px; }
    @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <h2>Ajout d'une Infraction</h2>
      <div id="injectAlert"></div>
      <div class="form-group">
        <select id="playerInput"><option>Chargement...</option></select>
        <select id="categoryInput"><option>Chargement...</option></select>
        <input type="datetime-local" id="dateInput" title="Laissez vide pour utiliser la date et l'heure actuelles">
        <button class="primary" onclick="submitData()" id="submitBtn">Ajouter</button>
      </div>
    </div>

    <div class="card">
      <h2>Tableau de Bord & Analyses</h2>
      <div class="filters">
        <select id="yearFilter" onchange="fetchAnalytics()">
          <option value="All">Toutes les années</option><option value="2026" selected>2026</option><option value="2025">2025</option>
        </select>
        <select id="monthFilter" onchange="fetchAnalytics()">
          <option value="All" selected>Tous les mois</option><option value="0">Janvier</option><option value="1">Février</option>
          <option value="2">Mars</option><option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
          <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option><option value="9">Octobre</option>
          <option value="10">Novembre</option><option value="11">Décembre</option>
        </select>
      </div>
      <div id="loadAlert"></div>
      <canvas id="mainChart" style="max-height: 400px; width: 100%;"></canvas>
    </div>

    <div class="card">
      <h2>Gestion des Données</h2>
      <div id="settingsAlert"></div>
      <div class="settings-grid">
        <div>
          <h3>Joueurs</h3>
          <ul class="entity-list" id="playersList"></ul>
          <div class="form-group">
            <input type="text" id="newPlayerName" placeholder="Nouveau Joueur">
            <button class="primary small" onclick="manageEntity('ADD', 'Players', 'newPlayerName')">Ajouter</button>
          </div>
        </div>
        <div>
          <h3>Catégories</h3>
          <ul class="entity-list" id="categoriesList"></ul>
          <div class="form-group">
            <input type="text" id="newCategoryName" placeholder="Nouvelle Catégorie">
            <button class="primary small" onclick="manageEntity('ADD', 'Categories', 'newCategoryName')">Ajouter</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Rapport Automatisé</h2>
      <div class="report-box" id="reportOutput">Initialisation du moteur d'analyse...</div>
      <button class="primary" style="margin-top: 20px; width: 100%;" onclick="exportReport()">Copier le rapport dans le presse-papiers</button>
    </div>

  </div>

  <script>
    let currentChart = null;

    function showAlert(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.className = 'alert ' + type;
      el.innerText = message;
      setTimeout(() => { el.className = 'alert'; }, 5000);
    }

    function initApp() {
      fetchSettings();
      fetchAnalytics();
    }

    function fetchSettings() {
      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          populateDropdown('playerInput', res.players);
          populateDropdown('categoryInput', res.categories);
          renderSettingsList('playersList', 'Players', res.players);
          renderSettingsList('categoriesList', 'Categories', res.categories);
        } else {
          showAlert('settingsAlert', res.error, 'error');
        }
      }).apiGetSettings();
    }

    function populateDropdown(elementId, items) {
      const el = document.getElementById(elementId);
      el.innerHTML = items.map(item => `<option value="${item}">${item}</option>`).join('');
    }

    function renderSettingsList(elementId, type, items) {
      const el = document.getElementById(elementId);
      el.innerHTML = items.map(item => `
        <li class="entity-item">
          <span>${item}</span>
          <div class="entity-actions">
            <button class="small" onclick="promptRename('${type}', '${item}')">Renommer</button>
            <button class="small" style="background:#ff4757;" onclick="manageEntity('DELETE', '${type}', null, '${item}')">Suppr</button>
          </div>
        </li>
      `).join('');
    }

    function manageEntity(action, type, inputId, fixedName = null) {
      const name = fixedName || document.getElementById(inputId).value.trim();
      if (!name) return;
      
      let newName = null;
      if (action === 'RENAME') {
        newName = prompt(`Entrez le nouveau nom pour ${name} :`);
        if (!newName || newName.trim() === '') return;
        newName = newName.trim();
      } else if (action === 'DELETE') {
        if (!confirm(`Êtes-vous sûr de vouloir supprimer '${name}' ?\nAttention : l'historique associé ne sera pas supprimé, mais il ne sera plus lié à cette entité.`)) return;
      }

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          if (inputId) document.getElementById(inputId).value = '';
          fetchSettings();
          fetchAnalytics();
        } else {
          showAlert('settingsAlert', res.error, 'error');
        }
      }).apiManageEntity(action, type, name, newName);
    }

    function promptRename(type, oldName) {
      manageEntity('RENAME', type, null, oldName);
    }

    function submitData() {
      const btn = document.getElementById('submitBtn');
      const player = document.getElementById('playerInput').value;
      const category = document.getElementById('categoryInput').value;
      const customDate = document.getElementById('dateInput').value;

      btn.innerText = "Traitement..."; btn.disabled = true;

      google.script.run.withSuccessHandler(res => {
        btn.innerText = "Ajouter"; btn.disabled = false;
        if (res.success) {
          showAlert('injectAlert', 'Donnée ajoutée avec succès !', 'success');
          document.getElementById('dateInput').value = ''; 
          fetchAnalytics(); 
        } else {
          showAlert('injectAlert', res.error, 'error');
        }
      }).apiAddScore(player, category, customDate);
    }

    function fetchAnalytics() {
      const year = document.getElementById('yearFilter').value;
      const month = document.getElementById('monthFilter').value;
      document.getElementById('reportOutput').innerText = "Compilation de la matrice analytique...";

      google.script.run.withSuccessHandler(res => {
        if (res.success) renderDashboard(res.data);
        else document.getElementById('reportOutput').innerText = "Erreur Système : " + res.error;
      }).apiGetData(year, month);
    }

    function renderDashboard(data) {
      document.getElementById('reportOutput').innerText = data.insights;

      const players = Object.keys(data.scores);
      const datasets = data.categories.map((cat, index) => {
        const colors = ['#ff4757', '#3742fa', '#2ed573', '#ffa502', '#eccc68', '#9b59b6', '#34495e'];
        return {
          label: cat,
          data: players.map(p => data.scores[p][cat] || 0),
          backgroundColor: colors[index % colors.length],
          borderRadius: 4
        };
      });

      const ctx = document.getElementById('mainChart').getContext('2d');
      if (currentChart) currentChart.destroy();
      currentChart = new Chart(ctx, {
        type: 'bar', data: { labels: players, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { stacked: true, grid: { color: '#2f3640' }, ticks: { color: '#e0e6ed', font: { weight: 'bold' } } },
            y: { stacked: true, grid: { color: '#2f3640' }, ticks: { color: '#e0e6ed', stepSize: 1 } }
          },
          plugins: { legend: { labels: { color: '#e0e6ed', usePointStyle: true, padding: 20 } } }
        }
      });
    }

    function exportReport() {
      const text = document.getElementById('reportOutput').innerText;
      navigator.clipboard.writeText("--- RAPPORT ANALYTIQUE PÉRIODIQUE ---\nGénéré le : " + new Date().toLocaleString('fr-FR') + "\n\n" + text).then(() => alert('Document copié dans le presse-papiers avec succès.'));
    }

    window.onload = initApp;
  </script>
</body>
</html>
