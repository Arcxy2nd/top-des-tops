      if (!list) return;
      if (!res.notes.length) { list.innerHTML = '<p class="m-empty">Aucune note.</p>'; return; }
      list.innerHTML = res.notes.map(n => {
        const p = cachedPlayers.find(p => p.name === n.player);
        const d = n.timestamp ? new Date(n.timestamp) : null;
        const ds = d ? (String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear()) : '';
        let noteMetaHtml = '';
        if (n.createdBy || (n.lastEditedBy && n.lastEditedAt)) {
          noteMetaHtml = '<div class="m-note-meta">';
          if (n.createdBy) {
            noteMetaHtml += '<span class="m-note-meta-item">✍️ Créé par ' + escapeHtml(n.createdBy) + '</span>';
          }
          if (n.lastEditedBy && n.lastEditedAt) {
            const ed = new Date(n.lastEditedAt);
            const eds = !isNaN(ed) ? (String(ed.getDate()).padStart(2,'0') + '/' + String(ed.getMonth()+1).padStart(2,'0')) : '';
            noteMetaHtml += '<button type="button" class="m-note-meta-item m-note-meta-edited" data-history="' + n.rowIndex + '">📝 Modifié par ' +
              escapeHtml(n.lastEditedBy) + (eds ? ' le ' + eds : '') + '  ⏱</button>';
          }
          noteMetaHtml += '</div>';
        }
        return '<div class="m-hist-card">' +
          '<div class="m-hist-top">' + avatarImgHtml(n.player, p ? p.meta : '', 'm-avatar sm') +
          '<strong>' + escapeHtml(n.player) + '</strong><span class="m-hist-meta" style="margin-left:auto;">' + ds + '</span></div>' +
          '<div class="m-hist-desc">' + renderMarkdown(n.text) + '</div>' +
          noteMetaHtml +
          '<div class="m-hist-actions">' +
          '<button class="small" data-edit="' + n.rowIndex + '">✏️</button>' +
          '<button class="danger small" data-del="' + n.rowIndex + '">🗑️</button>' +
          '</div></div>';
      }).join('');
      list.querySelectorAll('[data-history]').forEach(btn => {
        btn.addEventListener('click', () => {
          const rowIndex = btn.dataset.history;
          openModal('<h2>Historique des modifications</h2><div id="mNoteHistoryBody"><p class="m-empty">Chargement…</p></div>');
          callServer('apiGetNoteHistory', [rowIndex], histRes => {
            const body = document.getElementById('mNoteHistoryBody');
            if (!body) return;
            const entries = histRes.entries || [];
            if (!entries.length) { body.innerHTML = '<p class="m-empty">Aucune modification enregistrée.</p>'; return; }
            body.innerHTML = entries.map(en => {
              const d = new Date(en.timestamp);
              const ds = !isNaN(d)
                ? d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
                : '';
              return '<div class="m-note-history-entry">' +
                '<div class="m-note-history-head"><strong>' + escapeHtml(en.author || '?') + '</strong><span>' + ds + '</span></div>' +
                '<div class="m-note-history-text">' + escapeHtml(en.after) + '</div>' +
              '</div>';
            }).join('');
          });
        });
      });
      list.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!requireIdentity()) return;
          openConfirmModal('Supprimer cette note ?', () => {
            buzz();
            callServer('apiDeleteNote', [btn.dataset.del, _whoAmI || ''], () => {
              showToast('Note supprimée.', 'success');
              loadNotesList();
              loadNotesCountBadge();
            }, 'Suppression note');
          });
        });
      });
      list.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!requireIdentity()) return;
          const rowIndex = btn.dataset.edit;
          const note = res.notes.find(n => String(n.rowIndex) === String(rowIndex));
          openModal(
            '<h2>Modifier la note</h2>' +
            '<textarea id="mEditNoteText" rows="4">' + escapeHtml(note.text) + '</textarea>' +
            '<button class="primary" style="width:100%; margin-top:22px;" id="mEditNoteSave">Enregistrer</button>'
          );
          autoGrowTextarea(document.getElementById('mEditNoteText'));
          document.getElementById('mEditNoteSave').addEventListener('click', () => {
            const v = document.getElementById('mEditNoteText').value;
            if (!v.trim()) { showToast('La note ne peut pas être vide.', 'error'); return; }
            callServer('apiEditNote', [rowIndex, v, _whoAmI || ''], () => {
              closeModal();
              showToast('Note modifiée.', 'success');
              loadNotesList();
            }, 'Modification note');
          });
        });
      });
    }, 'Chargement notes');
  }

  function loadNotesCountBadge() {
    callServer('apiGetAllNotes', [], res => {
      const el = document.getElementById('notesCount');
      if (el) el.textContent = res.notes.length ? String(res.notes.length) : '';
    }, 'Chargement compteur notes');
  }

  let _mNotesLoadedOnce = false;
  function loadNotesTab() {
    _mNotesLoadedOnce = true;
    renderNotesShell();
  }

  // ══════════════════════════════════════════════════════════════════════
  // HISTORIQUE — rendu en cartes
  // ══════════════════════════════════════════════════════════════════════
  let mHistoryPage = 1;
  const M_HIST_PAGE_SIZE = 15;
  let mHistoryLoaded = [];
  let mHistSortDir = 'desc'; // 'desc' = plus récents d'abord (défaut) | 'asc' = plus anciens d'abord

  let mHistorySubTab = 'entries';

  let _mHistoryLoadedOnce = false;
  function renderHistoryShell() {
    _mHistoryLoadedOnce = true;
    const tab = document.getElementById('tab-history');
    tab.innerHTML =
      '<div class="m-chip-row" id="mHistSubNav" style="flex-wrap:nowrap; overflow-x:auto; margin-bottom:26px;">' +
        '<div class="m-chip active" data-sub="entries">📜 Entrées</div>' +
        '<div class="m-chip" data-sub="audit">🔍 Journal d\'audit</div>' +
      '</div>' +
      '<div id="mHistoryBody"></div>';

    tab.querySelectorAll('#mHistSubNav .m-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        mHistorySubTab = chip.dataset.sub;
        tab.querySelectorAll('#mHistSubNav .m-chip').forEach(c => c.classList.toggle('active', c === chip));
        renderHistoryBody();
      });
    });
    renderHistoryBody();
  }

  function renderHistoryBody() {
    if (mHistorySubTab === 'entries') renderHistoryEntriesShell();
    if (mHistorySubTab === 'audit')   renderAuditShell();
  }

  function renderHistoryEntriesShell() {
    const body = document.getElementById('mHistoryBody');
    body.innerHTML =
      '<div class="card">' +
        '<input type="text" id="mHistSearch" placeholder="🔍 Rechercher…">' +
        '<div class="m-row" style="margin-top:22px;">' +
          '<input type="date" id="mHistDateFrom" title="Depuis" style="flex:1;">' +
          '<input type="date" id="mHistDateTo"   title="Jusqu\'au" style="flex:1;">' +
          '<button id="mHistDateClearBtn" class="secondary small" title="Effacer la plage de dates">✕</button>' +
          '<button id="mHistSortBtn" class="m-hist-range-btn" title="Ordre par date">↓ Récents</button>' +
        '</div>' +
        '<div class="m-hist-range-row" id="mHistRangeChips">' +
          '<button class="m-hist-range-btn" data-range="today">Aujourd\'hui</button>' +
          '<button class="m-hist-range-btn" data-range="7d">7 jours</button>' +
          '<button class="m-hist-range-btn" data-range="month">Ce mois</button>' +
          '<button class="m-hist-range-btn" data-range="prevmonth">Mois dernier</button>' +
          '<button class="m-hist-range-btn" data-range="3m">3 mois</button>' +
          '<button class="m-hist-range-btn" data-range="year">Cette année</button>' +
          '<button class="m-hist-range-btn active" data-range="all">Tout</button>' +
        '</div>' +
      '</div>' +
      '<div id="mHistCards"></div>' +
      '<button id="mHistLoadMore" class="secondary" style="width:100%;">Charger plus</button>';

    let searchTimer = null;
    document.getElementById('mHistSearch').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { mHistoryPage = 1; mHistoryLoaded = []; loadHistoryTab(); }, 300);
    });
    const reloadFromDateChange = () => { mHistoryPage = 1; mHistoryLoaded = []; loadHistoryTab(); };
    document.getElementById('mHistDateFrom').addEventListener('change', reloadFromDateChange);
    document.getElementById('mHistDateTo').addEventListener('change',   reloadFromDateChange);
    document.getElementById('mHistDateClearBtn').addEventListener('click', () => {
      document.getElementById('mHistDateFrom').value = '';
      document.getElementById('mHistDateTo').value   = '';
      mSetActiveHistRange('all');
      reloadFromDateChange();
    });
    // Plages rapides : posent la plage dans les champs date puis rechargent.
    const mSetActiveHistRange = range => {
      document.querySelectorAll('#mHistRangeChips .m-hist-range-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.range === range));
    };
    const mHistQuickRangeDates = range => {
      const now = new Date();
      switch (range) {
        case 'today':     return { from: now, to: now };
        case '7d':        return { from: new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6), to: now };
        case 'month':     return { from: new Date(now.getFullYear(), now.getMonth(), 1), to: now };
        case 'prevmonth': return { from: new Date(now.getFullYear(), now.getMonth() - 1, 1),
                                   to:   new Date(now.getFullYear(), now.getMonth(), 0) };
        case '3m':        return { from: new Date(now.getFullYear(), now.getMonth() - 3, now.getDate()), to: now };
        case 'year':      return { from: new Date(now.getFullYear(), 0, 1), to: now };
        default:          return { from: null, to: null }; // 'all'
      }
    };
    document.querySelectorAll('#mHistRangeChips .m-hist-range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const { from, to } = mHistQuickRangeDates(btn.dataset.range);
        document.getElementById('mHistDateFrom').value = from ? toDateStr(from) : '';
        document.getElementById('mHistDateTo').value   = to   ? toDateStr(to)   : '';
        mSetActiveHistRange(btn.dataset.range);
        reloadFromDateChange();
      });
    });
    // Une saisie manuelle de date sort du mode "plage rapide".
    document.getElementById('mHistDateFrom').addEventListener('change', () => mSetActiveHistRange(''));
    document.getElementById('mHistDateTo').addEventListener('change',   () => mSetActiveHistRange(''));
    // Bascule de tri par date (récent ↔ ancien), parité avec le PC.
    const mSortBtn = document.getElementById('mHistSortBtn');
    const renderMSort = () => {
      const asc = mHistSortDir === 'asc';
      mSortBtn.textContent = asc ? '↑ Anciens' : '↓ Récents';
      mSortBtn.classList.toggle('active', asc);
    };
    mSortBtn.addEventListener('click', () => {
      mHistSortDir = mHistSortDir === 'asc' ? 'desc' : 'asc';
      renderMSort();
      reloadFromDateChange();
    });
    renderMSort();
    document.getElementById('mHistLoadMore').addEventListener('click', () => {
      mHistoryPage++;
      loadHistoryTab(true);
    });
    mHistoryPage = 1; mHistoryLoaded = [];
    loadHistoryTab();
  }

  // ── Journal d'audit — liste paginée en lecture seule ──
  let mAuditPage = 1;
  const M_AUDIT_PAGE_SIZE = 15;
  let mAuditLoaded = [];

  function renderAuditShell() {
    const body = document.getElementById('mHistoryBody');
    body.innerHTML =
      '<div class="card"><input type="text" id="mAuditSearch" placeholder="🔍 Rechercher…"></div>' +
      '<div id="mAuditCards"></div>' +
      '<button id="mAuditLoadMore" class="secondary" style="width:100%;">Charger plus</button>';

    let searchTimer = null;
    document.getElementById('mAuditSearch').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { mAuditPage = 1; mAuditLoaded = []; loadAuditTab(); }, 300);
    });
    document.getElementById('mAuditLoadMore').addEventListener('click', () => {
      mAuditPage++;
      loadAuditTab(true);
    });
    mAuditPage = 1; mAuditLoaded = [];
    loadAuditTab();
  }

  function auditIcon(action) {
    if (/suppr/i.test(action || '')) return '🗑️';
    if (/ajout|créé/i.test(action || '')) return '➕';
    if (/auto/i.test(action || '')) return '🤖';
    if (/nettoyage/i.test(action || '')) return '🧹';
    if (/modif|renommé|couleur|description|groupement/i.test(action || '')) return '✏️';
    return '•';
  }

  // Actions où "avant/après" ne reflète pas un vrai changement de valeur — le
  // contenu utile est déjà dans Détail, donc on n'affiche rien ici plutôt qu'un
  // fragment sans signification ("" → "3 entrée(s)"). Même liste que Index.html.
  const M_AUDIT_NO_DIFF_ACTIONS = new Set([
    'Saisie de points', 'Suppression bulk', 'Nettoyage zéros', 'Nettoyage orphelins',
    'Modification bulk', 'Phrases batch', 'Lots auto-groupés', 'Groupement lot',
    'Dégroupement lot', 'Retrait du groupe', 'Suppression groupe', 'Action annulée'
  ]);

  function auditCardHtml(log) {
    const p = cachedPlayers.find(pl => pl.name === log.author);
    const d = new Date(log.timestamp);
    const ds = isNaN(d.getTime()) ? '' :
      String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() +
      ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    const showDiff = !M_AUDIT_NO_DIFF_ACTIONS.has(log.action) && (log.before || log.after);
    return '<div class="m-hist-card">' +
      '<div class="m-hist-top">' +
      (log.author ? avatarImgHtml(log.author, p ? p.meta : '', 'm-avatar sm') + '<strong>' + escapeHtml(log.author) + '</strong>' : '<strong>Système</strong>') +
      '<span>' + auditIcon(log.action) + ' ' + escapeHtml(log.action || '') + '</span>' +
      '</div>' +
      '<div class="m-hist-meta">' + ds + '</div>' +
      (showDiff ?
        '<div class="m-hist-desc">' +
        (log.before ? '<span style="color:var(--error); text-decoration:line-through;">' + escapeHtml(String(log.before)) + '</span> ' : '') +
        ((log.before && log.after) ? '→ ' : '') +
        (log.after ? '<span style="color:var(--success);">' + escapeHtml(String(log.after)) + '</span>' : '') +
        '</div>' : '') +
      (log.detail ? '<div class="m-hist-meta">' + escapeHtml(log.detail) + '</div>' : '') +
      (log.undoable ? '<button class="secondary small m-audit-undo-btn" data-audit-id="' + log.id + '" data-audit-action="' + escapeHtml(log.action || '') + '">↩️ Annuler</button>' : '') +
      '</div>';
  }

  function undoAuditEntry(auditId, actionLabel) {
    if (!requireIdentity()) return;
    if (!confirm('Annuler cette action ("' + actionLabel + '") ?')) return;
    callServer('apiUndoAuditEntry', [auditId, _whoAmI || ''], res => {
      if (res && res.success === false) {
        showToast('Erreur : ' + (res.error || 'Annulation impossible.'), 'error');
      } else {
        showToast('Action annulée.', 'success');
        mAuditPage = 1; mAuditLoaded = [];
        loadAuditTab();
      }
    }, 'Annuler action journal');
  }

  function loadAuditTab(append) {
    const text = (document.getElementById('mAuditSearch') || {}).value || '';
    callServer('apiGetAuditLog', [mAuditPage, M_AUDIT_PAGE_SIZE, null, null, null, null, text || null], res => {
      const logs = (res && res.logs) || [];
      mAuditLoaded = append ? mAuditLoaded.concat(logs) : logs;
      const container = document.getElementById('mAuditCards');
      if (!mAuditLoaded.length) {
        container.innerHTML = '<p class="m-empty">Aucune entrée dans le journal.</p>';
      } else {
        container.innerHTML = mAuditLoaded.map(auditCardHtml).join('');
        container.querySelectorAll('.m-audit-undo-btn').forEach(btn => {
          btn.addEventListener('click', () => undoAuditEntry(btn.dataset.auditId, btn.dataset.auditAction));
        });
      }
      const loadMoreBtn = document.getElementById('mAuditLoadMore');
      const total = (res && res.totalEntries) || mAuditLoaded.length;
      const loadedCount = mAuditPage * M_AUDIT_PAGE_SIZE;
      loadMoreBtn.style.display = loadedCount >= total ? 'none' : '';
    }, 'Chargement journal');
  }

  function historyCardHtml(log) {
    const p = cachedPlayers.find(p => p.name === log.player);
    const d = new Date(log.timestamp);
    const ds = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    const cat = cachedCategories.find(c => c.name === log.category);
    const sp = log.saiseur ? cachedPlayers.find(pl => pl.name === log.saiseur) : null;
    return '<div class="m-hist-card" data-row="' + log.rowIndex + '">' +
      '<div class="m-hist-top">' + avatarImgHtml(log.player, p ? p.meta : '', 'm-avatar sm') +
      '<strong>' + escapeHtml(log.player) + '</strong>' +
      '<span style="color:' + categoryColor(log.category) + ';">' + (cat ? cat.icon : '') + ' ' + escapeHtml(log.category) + '</span>' +
      '<span class="m-hist-pts">' + log.points + ' pts</span></div>' +
      '<div class="m-hist-meta">' + ds + (log.saiseur ? ' · saisi par ' + avatarImgHtml(log.saiseur, sp ? sp.meta : '', 'm-avatar sm') + escapeHtml(log.saiseur) : '') + '</div>' +
      (log.description ? '<div class="m-hist-desc">' + renderMarkdown(log.description) + '</div>' : '') +
      '<div class="m-hist-actions">' +
      '<button class="small" data-edit="' + log.rowIndex + '">✏️</button>' +
      '<button class="danger small" data-del="' + log.rowIndex + '">🗑️</button>' +
      '</div></div>';
  }

  function bindHistoryCardActions() {
    document.querySelectorAll('#mHistCards [data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        openConfirmModal('Supprimer cette entrée ?', () => {
          buzz();
          callServer('apiDeleteHistoryEntries', [[btn.dataset.del], _whoAmI || ''], () => {
            showToast('Entrée supprimée.', 'success');
            mHistoryPage = 1; mHistoryLoaded = [];
            loadHistoryTab();
          }, 'Suppression entrée');
        });
      });
    });
    document.querySelectorAll('#mHistCards [data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const rowIndex = btn.dataset.edit;
        const log = mHistoryLoaded.find(l => String(l.rowIndex) === String(rowIndex));
        openHistoryEditModal(log);
      });
    });
  }

  function openHistoryEditModal(log) {
    const playerOptions = cachedPlayers.map(p =>
      '<option value="' + escapeHtml(p.name) + '"' + (p.name === log.player ? ' selected' : '') + '>' + escapeHtml(p.name) + '</option>').join('');
    const catOptions = cachedCategories.map(c =>
      '<option value="' + escapeHtml(c.name) + '"' + (c.name === log.category ? ' selected' : '') + '>' + escapeHtml(c.name) + '</option>').join('');
    openModal(
      '<h2>Modifier l\'entrée</h2>' +
      '<label style="font-size:1.65rem; color:var(--text-muted);">Date</label>' +
      '<input type="date" id="mEditDate" value="' + toDateStr(new Date(log.timestamp)) + '">' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Joueur</label>' +
      '<select id="mEditPlayer">' + playerOptions + '</select>' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Top</label>' +
      '<select id="mEditCat">' + catOptions + '</select>' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Points</label>' +
      '<input type="number" id="mEditPts" value="' + log.points + '" min="1">' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Description</label>' +
      '<input type="text" id="mEditDesc" value="' + escapeHtml(log.description || '') + '">' +
      '<button class="primary" style="width:100%; margin-top:26px;" id="mEditSave">Enregistrer</button>'
    );
    document.getElementById('mEditSave').addEventListener('click', () => {
      const fields = {
        date:        document.getElementById('mEditDate').value,
        player:      document.getElementById('mEditPlayer').value,
        category:    document.getElementById('mEditCat').value,
        points:      document.getElementById('mEditPts').value,
        description: document.getElementById('mEditDesc').value,
        saiseur:     log.saiseur || ''
      };
      callServer('apiUpdateHistoryEntry', [log.rowIndex, fields, _whoAmI || ''], () => {
        closeModal();
        showToast('Entrée modifiée.', 'success');
        mHistoryPage = 1; mHistoryLoaded = [];
        loadHistoryTab();
      }, 'Modification entrée');
    });
  }

  function loadHistoryTab(append) {
    if (!document.getElementById('mHistCards')) renderHistoryShell();
    const text = (document.getElementById('mHistSearch') || {}).value || '';
    const dateFrom = (document.getElementById('mHistDateFrom') || {}).value || null;
    const dateTo   = (document.getElementById('mHistDateTo')   || {}).value || null;
    callServer('apiGetHistoryPage', [mHistoryPage, M_HIST_PAGE_SIZE, [], [], text, dateFrom, dateTo, mHistSortDir], res => {
      mHistoryLoaded = append ? mHistoryLoaded.concat(res.logs) : res.logs;
      const container = document.getElementById('mHistCards');
      if (!mHistoryLoaded.length) {
        container.innerHTML = '<p class="m-empty">Aucune entrée.</p>';
      } else {
        container.innerHTML = mHistoryLoaded.map(historyCardHtml).join('');
        bindHistoryCardActions();
      }
      const loadMoreBtn = document.getElementById('mHistLoadMore');
      const loadedCount = mHistoryPage * M_HIST_PAGE_SIZE;
      loadMoreBtn.style.display = loadedCount >= res.totalEntries ? 'none' : '';
      const badge = document.getElementById('historyCount');
      if (badge) badge.textContent = String(res.totalEntries);
    }, 'Chargement historique');
  }

  // ══════════════════════════════════════════════════════════════════════
  // PARAMÈTRES — sous-onglets en scroll horizontal (liste plate + édition inline)
  // ══════════════════════════════════════════════════════════════════════
  let mSettingsSubTab = 'players';
  let mBaremeEntries = [];
  let mPhrasesAll = [];
  let mActivePreset = '__default__';

  function renderSettingsShell() {
    const tab = document.getElementById('tab-settings');
    tab.innerHTML =
      '<div class="m-chip-row" id="mSettingsSubNav" style="flex-wrap:nowrap; overflow-x:auto; margin-bottom:26px;">' +
        '<div class="m-chip active" data-sub="players">👤 Joueurs</div>' +
        '<div class="m-chip" data-sub="categories">🎯 Tops</div>' +
        '<div class="m-chip" data-sub="bareme">⚖️ Barème</div>' +
        '<div class="m-chip" data-sub="phrases">🎭 Phrases</div>' +
        '<div class="m-chip" data-sub="outils">🔧 Outils</div>' +
      '</div>' +
      '<div id="mSettingsBody"></div>';

    tab.querySelectorAll('#mSettingsSubNav .m-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        mSettingsSubTab = chip.dataset.sub;
        tab.querySelectorAll('#mSettingsSubNav .m-chip').forEach(c => c.classList.toggle('active', c === chip));
        renderSettingsBody();
      });
    });
    renderSettingsBody();
  }

  function renderSettingsBody() {
    if (mSettingsSubTab === 'players')    renderEntitySettings('Players');
    if (mSettingsSubTab === 'categories') renderEntitySettings('Categories');
    if (mSettingsSubTab === 'bareme')     renderBaremeSettings();
    if (mSettingsSubTab === 'phrases')    renderPhrasesSettings();
    if (mSettingsSubTab === 'outils')     renderOutilsShell();
  }

  // ── Joueurs / Catégories : liste plate + édition inline ──
  function renderEntitySettings(type) {
    const body = document.getElementById('mSettingsBody');
    const items = type === 'Players' ? cachedPlayers : cachedCategories;
    body.innerHTML =
      '<div class="card">' +
        '<h2>' + (type === 'Players' ? '👤 Joueurs' : '🎯 Tops') + '</h2>' +
        '<div id="mEntityList"></div>' +
        '<button class="secondary" id="mEntityAdd" style="width:100%; margin-top:22px;">＋ Ajouter</button>' +
      '</div>';

    const list = document.getElementById('mEntityList');
    list.innerHTML = items.map(item =>
      '<div style="border-bottom:1px solid var(--border); padding:22px 0;" data-name="' + escapeHtml(item.name) + '">' +
      '<div class="m-row">' +
      (type === 'Players' ? avatarImgHtml(item.name, item.meta, 'm-avatar sm')
                           : '<span style="font-size:2.6rem;">' + (item.icon || '🏷️') + '</span>') +
      '<span style="flex:1;">' + escapeHtml(item.name) + '</span>' +
      '<span style="width:35px; height:35px; border-radius:50%; flex-shrink:0; background:' +
        (type === 'Players' ? playerColor(item.name) : categoryColor(item.name)) + ';"></span>' +
      '<button class="small" data-edit>✏️</button>' +
      '<button class="danger small" data-del>🗑️</button>' +
      '</div>' +
      (type === 'Categories' && item.meta
        ? '<div class="m-hist-desc" style="margin-top:14px;">' + renderMarkdown(item.meta) + '</div>'
        : '') +
      '</div>'
    ).join('') || '<p class="m-empty">Aucun élément.</p>';

    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const name = btn.closest('[data-name]').dataset.name;
        openConfirmModal('Supprimer "' + name + '" définitivement ?', () => {
          buzz();
          callServer('apiManageEntity', ['DELETE', type, null, null, name, null, _whoAmI || ''], () => {
            showToast('Supprimé.', 'success');
            loadEntities(() => renderSettingsBody());
          }, 'Suppression');
        });
      });
    });
    list.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const name = btn.closest('[data-name]').dataset.name;
        const item = items.find(i => i.name === name);
        openEntityFormModal(type, item);
      });
    });
    document.getElementById('mEntityAdd').addEventListener('click', () => {
      if (!requireIdentity()) return;
      openEntityFormModal(type, null);
    });
  }

  function openEntityFormModal(type, item) {
    const isPlayer = type === 'Players';
    openModal(
      '<h2>' + (item ? 'Modifier' : 'Ajouter') + ' — ' + (isPlayer ? 'Joueur' : 'Top') + '</h2>' +
      '<label style="font-size:1.65rem; color:var(--text-muted);">Nom</label>' +
      '<input type="text" id="mEntityName" value="' + (item ? escapeHtml(item.name) : '') + '">' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">' +
        (isPlayer ? 'URL avatar (optionnel)' : 'Description (optionnel)') + '</label>' +
      '<input type="text" id="mEntityMeta" value="' + (item ? escapeHtml(item.meta || '') : '') + '">' +
      (isPlayer ? '' :
        '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Emoji</label>' +
        '<input type="text" id="mEntityIcon" value="' + (item ? escapeHtml(item.icon || '') : '') + '" maxlength="4">') +
      '<button class="primary" style="width:100%; margin-top:26px;" id="mEntitySave">Enregistrer</button>'
    );
    document.getElementById('mEntitySave').addEventListener('click', () => {
      const name = document.getElementById('mEntityName').value.trim();
      const meta = document.getElementById('mEntityMeta').value.trim();
      const icon = isPlayer ? '' : (document.getElementById('mEntityIcon').value.trim());
      if (!name) { showToast('Le nom ne peut pas être vide.', 'error'); return; }
      const action = item ? 'RENAME' : 'ADD';
      callServer('apiManageEntity', [action, type, name, meta, item ? item.name : null, icon, _whoAmI || ''], () => {
        closeModal();
        showToast('Enregistré.', 'success');
        loadEntities(() => renderSettingsBody());
      }, 'Enregistrement');
    });
  }

  // ── Barème ──
  function renderBaremeSettings() {
    const body = document.getElementById('mSettingsBody');
    body.innerHTML = '<div class="card"><h2>⚖️ Barème</h2><div id="mBaremeList" class="m-empty">Chargement…</div>' +
      '<button class="secondary" id="mBaremeAdd" style="width:100%; margin-top:22px;">＋ Ajouter une règle</button></div>';

    callServer('apiGetBareme', [], res => {
      mBaremeEntries = res.entries;
      const list = document.getElementById('mBaremeList');
      list.innerHTML = mBaremeEntries.map(entry =>
        '<div class="m-row" style="border-bottom:1px solid var(--border); padding:22px 0;" data-row="' + entry.rowIndex + '">' +
        '<span style="flex:1;">' + escapeHtml(entry.top) + ' — ' + escapeHtml(entry.action) + '</span>' +
        '<strong>' + entry.pts + ' pts</strong>' +
        '<button class="small" data-edit>✏️</button>' +
        '<button class="danger small" data-del>🗑️</button>' +
        '</div>'
      ).join('') || '<p class="m-empty">Aucune règle.</p>';

      list.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!requireIdentity()) return;
          const rowIndex = btn.closest('[data-row]').dataset.row;
          openConfirmModal('Supprimer cette règle ?', () => {
            callServer('apiDeleteBaremeEntry', [rowIndex, _whoAmI || ''], () => {
              showToast('Règle supprimée.', 'success');
              renderBaremeSettings();
            }, 'Suppression règle');
          });
        });
      });
      list.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!requireIdentity()) return;
          const rowIndex = btn.closest('[data-row]').dataset.row;
          const entry = mBaremeEntries.find(e => String(e.rowIndex) === String(rowIndex));
          openBaremeFormModal(entry);
        });
      });
    }, 'Chargement barème');

    document.getElementById('mBaremeAdd').addEventListener('click', () => {
      if (!requireIdentity()) return;
      openBaremeFormModal(null);
    });
  }

  function openBaremeFormModal(entry) {
    const catOptions = cachedCategories.map(c =>
      '<option value="' + escapeHtml(c.name) + '"' + (entry && entry.top === c.name ? ' selected' : '') + '>' + escapeHtml(c.name) + '</option>').join('');
    openModal(
      '<h2>' + (entry ? 'Modifier' : 'Ajouter') + ' une règle</h2>' +
      (entry ? '<p>' + escapeHtml(entry.top) + '</p>' :
        '<label style="font-size:1.65rem; color:var(--text-muted);">Top</label><select id="mBaremeTop">' + catOptions + '</select>') +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Action</label>' +
      '<input type="text" id="mBaremeAction" value="' + (entry ? escapeHtml(entry.action) : '') + '">' +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Points</label>' +
      '<input type="number" id="mBaremePts" value="' + (entry ? entry.pts : 1) + '">' +
      '<button class="primary" style="width:100%; margin-top:26px;" id="mBaremeSave">Enregistrer</button>'
    );
    document.getElementById('mBaremeSave').addEventListener('click', () => {
      const action = document.getElementById('mBaremeAction').value.trim();
      const pts = document.getElementById('mBaremePts').value;
      if (!action) { showToast('Action vide.', 'error'); return; }
      if (entry) {
        callServer('apiUpdateBaremeEntry', [entry.rowIndex, action, pts, _whoAmI || ''], () => {
          closeModal(); showToast('Règle modifiée.', 'success'); renderBaremeSettings();
        }, 'Modification règle');
      } else {
        const top = document.getElementById('mBaremeTop').value;
        callServer('apiAddBaremeEntry', [top, action, pts, _whoAmI || ''], () => {
          closeModal(); showToast('Règle ajoutée.', 'success'); renderBaremeSettings();
        }, 'Ajout règle');
      }
    });
  }

  // ── Presets de phrases : liste plate + édition inline ──
  function renderPhrasesSettings() {
    const body = document.getElementById('mSettingsBody');
    body.innerHTML = '<div class="card"><h2>🎭 Phrases</h2>' +
      '<label style="font-size:1.65rem; color:var(--text-muted);">Preset actif</label>' +
      '<select id="mPresetSelect"></select>' +
      '<div class="m-row" style="gap:18px; margin-top:18px;">' +
        '<button class="secondary small" id="mPresetNew" style="flex:1;">＋ Nouveau</button>' +
        '<button class="secondary small" id="mPresetRename" style="flex:1;">✏️ Renommer</button>' +
        '<button class="danger small" id="mPresetDelete" style="flex:1;">🗑️ Supprimer</button>' +
      '</div>' +
      '<div id="mPhrasesList" style="margin-top:22px;" class="m-empty">Chargement…</div>' +
      '<button class="secondary" id="mPhraseAdd" style="width:100%; margin-top:22px;">＋ Ajouter une phrase</button>' +
      '</div>';

    callServer('apiGetActivePhrasePreset', [], activeRes => {
      mActivePreset = activeRes.preset;
      callServer('apiGetPhrases', [], res => {
        mPhrasesAll = res.phrases;
        const presets = Array.from(new Set(mPhrasesAll.map(p => p.preset).concat([mActivePreset, '__default__'])));
        const select = document.getElementById('mPresetSelect');
        select.innerHTML = presets.map(p =>
          '<option value="' + escapeHtml(p) + '"' + (p === mActivePreset ? ' selected' : '') + '>' +
          (p === '__default__' ? 'Défaut' : escapeHtml(p)) + '</option>').join('');
        select.addEventListener('change', () => {
          if (!requireIdentity()) { select.value = mActivePreset; return; }
          callServer('apiSetActivePhrasePreset', [select.value, _whoAmI || ''], () => {
            mActivePreset = select.value;
            renderPhrasesList();
          }, 'Changement preset actif');
        });
        renderPhrasesList();
      }, 'Chargement phrases');
    }, 'Chargement preset actif');

    document.getElementById('mPhraseAdd').addEventListener('click', () => {
      if (!requireIdentity()) return;
      openPhraseFormModal(null);
    });

    document.getElementById('mPresetNew').addEventListener('click', () => {
      if (!requireIdentity()) return;
      openPresetNameModal('Nouveau preset', '', name => {
        if (name === '__default__' || name === 'Défaut') { showToast('Nom réservé.', 'error'); return; }
        callServer('apiSetActivePhrasePreset', [name, _whoAmI || ''], () => {
          mActivePreset = name;
          showToast('Preset "' + name + '" créé ✓', 'success');
          renderPhrasesSettings();
        }, 'Création preset');
      });
    });

    document.getElementById('mPresetRename').addEventListener('click', () => {
      if (!requireIdentity()) return;
      if (mActivePreset === '__default__') { showToast('Impossible de renommer le preset Défaut.', 'error'); return; }
      openPresetNameModal('Renommer le preset', mActivePreset, newName => {
        if (newName === mActivePreset) return;
        if (newName === '__default__' || newName === 'Défaut') { showToast('Nom réservé.', 'error'); return; }
        callServer('apiRenamePreset', [mActivePreset, newName, _whoAmI || ''], () => {
          mActivePreset = newName;
          showToast('Preset renommé ✓', 'success');
          renderPhrasesSettings();
        }, 'Renommage preset');
      });
    });

    document.getElementById('mPresetDelete').addEventListener('click', () => {
      if (!requireIdentity()) return;
      const label = mActivePreset === '__default__' ? 'Défaut' : mActivePreset;
      const msg = mActivePreset === '__default__'
        ? 'Vider le preset "Défaut" de toutes ses phrases personnalisées ?'
        : 'Supprimer le preset "' + label + '" et toutes ses phrases ?';
      openConfirmModal(msg, () => {
        callServer('apiDeletePreset', [mActivePreset, _whoAmI || ''], () => {
          mActivePreset = '__default__';
          showToast('Preset supprimé.', 'success');
          renderPhrasesSettings();
        }, 'Suppression preset');
      });
    });
  }

  function openPresetNameModal(title, initialValue, onSave) {
    openModal(
      '<h2>' + title + '</h2>' +
      '<label style="font-size:1.65rem; color:var(--text-muted);">Nom du preset</label>' +
      '<input type="text" id="mPresetNameInput" value="' + escapeHtml(initialValue) + '">' +
      '<button class="primary" style="width:100%; margin-top:26px;" id="mPresetNameSave">Enregistrer</button>'
    );
    setTimeout(() => document.getElementById('mPresetNameInput').focus(), 60);
    document.getElementById('mPresetNameSave').addEventListener('click', () => {
      const name = document.getElementById('mPresetNameInput').value.trim();
      if (!name) { showToast('Nom vide.', 'error'); return; }
      closeModal();
      onSave(name);
    });
  }

  function renderPhrasesList() {
    const list = document.getElementById('mPhrasesList');
    const entries = mPhrasesAll.filter(p => p.preset === mActivePreset);
    list.innerHTML = entries.map(p =>
      '<div class="m-row" style="border-bottom:1px solid var(--border); padding:22px 0;" data-row="' + p.rowIndex + '">' +
      '<span style="font-size:1.55rem; color:var(--text-muted); min-width:96px;">[' + escapeHtml(p.pool) + ']</span>' +
      '<span style="flex:1;">' + escapeHtml(p.text) + '</span>' +
      '<button class="small" data-edit>✏️</button>' +
      '<button class="danger small" data-del>🗑️</button>' +
      '</div>'
    ).join('') || '<p class="m-empty">Aucune phrase dans ce preset.</p>';

    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const rowIndex = btn.closest('[data-row]').dataset.row;
        openConfirmModal('Supprimer cette phrase ?', () => {
          callServer('apiDeletePhrase', [rowIndex, _whoAmI || ''], () => {
            showToast('Phrase supprimée.', 'success');
            renderPhrasesSettings();
          }, 'Suppression phrase');
        });
      });
    });
    list.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const rowIndex = btn.closest('[data-row]').dataset.row;
        const entry = entries.find(e => String(e.rowIndex) === String(rowIndex));
        openPhraseFormModal(entry);
      });
    });
  }

  function openPhraseFormModal(entry) {
    const pools = ['first','second','third','mid','last','tied','solo'];
    const poolOptions = pools.map(p =>
      '<option value="' + p + '"' + (entry && entry.pool === p ? ' selected' : '') + '>' + p + '</option>').join('');
    openModal(
      '<h2>' + (entry ? 'Modifier' : 'Ajouter') + ' une phrase</h2>' +
      (entry ? '' : '<label style="font-size:1.65rem; color:var(--text-muted);">Pool</label><select id="mPhrasePool">' + poolOptions + '</select>') +
      '<label style="font-size:1.65rem; color:var(--text-muted); margin-top:18px; display:block;">Texte (variables : {player} {pts} {gap} {behind} {rank})</label>' +
      '<textarea id="mPhraseText" rows="3">' + (entry ? escapeHtml(entry.text) : '') + '</textarea>' +
      '<button class="primary" style="width:100%; margin-top:26px;" id="mPhraseSave">Enregistrer</button>'
    );
    autoGrowTextarea(document.getElementById('mPhraseText'));
    document.getElementById('mPhraseSave').addEventListener('click', () => {
      const text = document.getElementById('mPhraseText').value.trim();
      if (!text) { showToast('Le texte ne peut pas être vide.', 'error'); return; }
      if (entry) {
        callServer('apiUpdatePhrase', [entry.rowIndex, text, _whoAmI || ''], () => {
          closeModal(); showToast('Phrase modifiée.', 'success'); renderPhrasesSettings();
        }, 'Modification phrase');
      } else {
        const pool = document.getElementById('mPhrasePool').value;
        callServer('apiAddPhrase', [mActivePreset, pool, text, _whoAmI || ''], () => {
          closeModal(); showToast('Phrase ajoutée.', 'success'); renderPhrasesSettings();
        }, 'Ajout phrase');
      }
    });
  }

  function initSettingsTab() {
    renderSettingsShell();
  }

  // ══════════════════════════════════════════════════════════════════════
  // OUTILS — rapport de santé, nettoyage orphelins, lots répartis
  // ══════════════════════════════════════════════════════════════════════
  let mDetectedLots = [];

  function renderOutilsShell() {
    // Vit désormais sous Paramètres → Outils (sous-onglet), plus en onglet
    // principal séparé — évite un raccourci redondant dans la nav.
    const tab = document.getElementById('mSettingsBody');
    tab.innerHTML =
      '<div class="card">' +
        '<h2>🩺 Rapport de santé</h2>' +
        '<div id="mHealthReport" class="m-empty">Chargement…</div>' +
      '</div>' +
      '<div class="card">' +
        '<h2>🧹 Nettoyage</h2>' +
        '<p style="font-size:1.85rem; color:var(--text-muted);">Supprime les entrées dont le joueur ou le top n\'existe plus.</p>' +
        '<button class="danger" id="mCleanOrphans" style="width:100%;">🗑️ Nettoyer les orphelins</button>' +
      '</div>' +
      '<div class="card">' +
        '<h2>🔗 Lots répartis</h2>' +
        '<p style="font-size:1.85rem; color:var(--text-muted);">Détecte les entrées identiques saisies sur plusieurs jours (probable lot réparti manuellement).</p>' +
        '<button class="secondary" id="mDetectLots" style="width:100%;">🔍 Détecter les lots répartis</button>' +
        '<div id="mLotsList" style="margin-top:22px;"></div>' +
      '</div>';

    document.getElementById('mCleanOrphans').addEventListener('click', () => {
      if (!requireIdentity()) return;
      openConfirmModal('Supprimer toutes les entrées orphelines ? Une sauvegarde est créée avant suppression.', () => {
        buzz();
        const btn = document.getElementById('mCleanOrphans');
        const stop = startBtnLoading(btn, 'Nettoyage…');
        callServer('apiDeleteOrphans', [_whoAmI || ''], res => {
          stop();
          showToast(res.deleted + ' entrée(s) supprimée(s).', 'success');
          loadHealthReport();
        }, 'Nettoyage orphelins', () => stop());
      });
    });

    document.getElementById('mDetectLots').addEventListener('click', () => {
      const btn = document.getElementById('mDetectLots');
      const stop = startBtnLoading(btn, 'Analyse…');
      callServer('apiDetectDistributedLots', [], res => {
        stop();
        mDetectedLots = res.lots;
        renderLotsList();
      }, 'Détection lots', () => stop());
    });

    loadHealthReport();
  }

  function loadHealthReport() {
    callServer('apiGetDataHealth', [], res => {
      const el = document.getElementById('mHealthReport');
      if (!el) return;
      el.innerHTML =
        '<div class="m-row" style="margin-bottom:14px;"><span>Entrées totales</span><strong style="margin-left:auto;">' + res.health.total + '</strong></div>' +
        '<div class="m-row" style="margin-bottom:14px;"><span>Points à 0/négatifs</span><strong style="margin-left:auto; color:var(--warn);">' + res.health.zeros + '</strong></div>' +
        '<div class="m-row"><span>Entrées orphelines</span><strong style="margin-left:auto; color:var(--error);">' + res.health.orphans + '</strong></div>';
    }, 'Chargement rapport de santé');
  }

  function renderLotsList() {
    const list = document.getElementById('mLotsList');
    if (!mDetectedLots.length) { list.innerHTML = '<p class="m-empty">Aucun lot réparti détecté.</p>'; return; }
    list.innerHTML = mDetectedLots.map((lot, i) => {
      const p = cachedPlayers.find(p => p.name === lot.player);
      return '<div class="m-hist-card" data-idx="' + i + '">' +
        '<div class="m-hist-top">' + avatarImgHtml(lot.player, p ? p.meta : '', 'm-avatar sm') +
        '<strong>' + escapeHtml(lot.player) + '</strong><span class="m-hist-pts">' + lot.totalPts + ' pts</span></div>' +
        '<div class="m-hist-meta">' + escapeHtml(lot.category) + ' · ' + lot.count + ' entrées · ' + lot.dateFrom + ' → ' + lot.dateTo + '</div>' +
        (lot.description ? '<div class="m-hist-desc">' + renderMarkdown(lot.description) + '</div>' : '') +
        '<div class="m-hist-actions"><button class="primary small" data-group>🔗 Regrouper ce lot</button></div>' +
        '</div>';
    }).join('');
    list.querySelectorAll('[data-group]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!requireIdentity()) return;
        const idx = Number(btn.closest('[data-idx]').dataset.idx);
        const lot = mDetectedLots[idx];
        buzz();
        callServer('apiGroupDistributedLots', [[lot], _whoAmI || ''], () => {
          showToast('Lot regroupé.', 'success');
          mDetectedLots.splice(idx, 1);
          renderLotsList();
        }, 'Regroupement lot');
      });
    });
  }

    { key: 'saisie', icon: '✍️', title: 'Saisir un Lot', body: 'Choisis une date, ajoute une ligne par entrée (joueur, top, points, description optionnelle), puis enregistre le lot en une fois. Une plage de dates permet de répéter ou répartir une entrée sur plusieurs jours.' },
    { key: 'parametres', icon: '⚙️', title: 'Paramètres', body: 'Gère les joueurs et tops (nom, avatar/emoji, couleur), le barème de points par top, et les presets de phrases de la card Commentaires.' },

  function renderGuideShell() {
    const tab = document.getElementById('tab-guide');
    tab.innerHTML =
      '<div class="card">' +
        '<div id="mGuideGrid" class="m-guide-grid">' +
          GUIDE_SECTIONS.map(s =>
            '<button type="button" class="m-guide-tile" data-guide="' + s.key + '">' +
              '<span class="m-guide-tile-icon">' + s.icon + '</span>' +
              '<span class="m-guide-tile-title">' + escapeHtml(s.title) + '</span>' +
            '</button>'
          ).join('') +
        '</div>' +
        '<div id="mGuideDetail" class="m-guide-detail" style="display:none;">' +
          '<button type="button" id="mGuideBackBtn" class="m-guide-back">← Retour</button>' +
          '<h3 id="mGuideDetailTitle"></h3>' +
          '<div id="mGuideDetailBody" class="m-guide-detail-body"></div>' +
        '</div>' +
      '</div>';
    document.getElementById('mGuideGrid').addEventListener('click', (e) => {
      const tile = e.target.closest('.m-guide-tile');
      if (tile) openMGuideDetail(tile.dataset.guide);
    });
    document.getElementById('mGuideBackBtn').addEventListener('click', closeMGuideDetail);
  }

  function openMGuideDetail(key) {
    const section = GUIDE_SECTIONS.find(s => s.key === key);
    if (!section) return;
    document.getElementById('mGuideDetailTitle').textContent = section.icon + ' ' + section.title;
    document.getElementById('mGuideDetailBody').innerHTML = '<p>' + escapeHtml(section.body) + '</p>';
    document.getElementById('mGuideGrid').style.display = 'none';
    document.getElementById('mGuideDetail').style.display = 'block';
  }

  function closeMGuideDetail() {
    document.getElementById('mGuideDetail').style.display = 'none';
    document.getElementById('mGuideGrid').style.display = 'grid';
  }

  function initGuideTab() {
    if (!document.querySelector('#tab-guide .m-guide-grid')) renderGuideShell();
  }

  // ══════════════════════════════════════════════════════════════════════
  // TCHAT FLOTTANT — widget global (bouton + panneau), pas un onglet :
  // accessible depuis n'importe quel onglet. Le bouton se déplace au
  // glisser (Pointer Events, souris et tactile) ; un tap sans déplacement
  // ouvre/ferme le panneau. Position mémorisée en localStorage.
  // ══════════════════════════════════════════════════════════════════════
  let _mChatMessages = [];
  let _mChatLoadedOnce = false;
  let _mChatReplyTo = null;
  let _mChatPollTimer = null;
  let _mChatAtBottom = true;
  let _mChatPanelOpen = false;
  let _mChatInputFit = null;
  let _mChatUnreadCount = 0;
  let _mChatPendingSends = []; // envois optimistes pas encore confirmés par le serveur
  const M_CHAT_FAB_POS_KEY = 'tdt_chat_fab_pos_mobile';

  function mFormatChatTime(iso) {
    if (!iso) return { short: '', title: '' };
    const d = new Date(iso);
    if (isNaN(d.getTime())) return { short: '', title: '' };
    return {
      short: d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
      title: d.toLocaleString('fr-FR', { dateStyle: 'medium', timeStyle: 'short' })
    };
  }

  function mChatSnippet(text, len) {
    const clean = (text || '').replace(/\n/g, ' ').trim();
    return clean.length > len ? clean.slice(0, len) + '…' : clean;
  }

  function mBuildChatMessageEl(msg) {
    const el = document.createElement('div');
    el.className = 'm-chat-msg' + (msg.pending ? ' pending' : '');
    el.id = 'm-chat-msg-' + msg.id;

    const player = cachedPlayers.find(p => p.name === msg.author);
    const img = document.createElement('img');
    img.className = 'm-chat-msg-avatar';
    img.src = getAvatarUrl(msg.author, player ? player.meta : '');
    img.alt = msg.author;
    img.onerror = () => { img.src = getAvatarUrl(msg.author, ''); };
    el.appendChild(img);

    const col = document.createElement('div');
    col.className = 'm-chat-msg-body-col';

    const head = document.createElement('div');
    head.className = 'm-chat-msg-head';
    const author = document.createElement('span');
    author.className = 'm-chat-msg-author';
    author.textContent = msg.author;
    author.style.color = playerColor(msg.author);
    head.appendChild(author);
    const time = mFormatChatTime(msg.timestamp);
    const timeEl = document.createElement('span');
    timeEl.className = 'm-chat-msg-time';
    timeEl.textContent = msg.pending ? '🕒' : time.short;
    timeEl.title = msg.pending ? 'Envoi en cours…' : time.title;
    head.appendChild(timeEl);

    const actions = document.createElement('div');
    actions.className = 'm-chat-msg-actions';
    if (!msg.pending) {
      const replyBtn = document.createElement('button');
      replyBtn.textContent = '↩️';
      replyBtn.title = 'Répondre';
      replyBtn.addEventListener('click', () => mSetChatReplyTo(msg));
      actions.appendChild(replyBtn);
      if (msg.author === _whoAmI) {
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.title = 'Supprimer';
        delBtn.addEventListener('click', () => {
          if (!requireIdentity()) return;
          openConfirmModal('Supprimer ce message ?', () => {
            buzz();
            callServer('apiDeleteChatMessage', [msg.id, _whoAmI || ''], () => {
              _mChatMessages = _mChatMessages.filter(m => m.id !== msg.id);
              mRenderChatMessages(false);
            }, 'Suppression message');
          });
        });
        actions.appendChild(delBtn);
      }
    }
    head.appendChild(actions);
    col.appendChild(head);

    if (msg.replyToId) {
      const reply = document.createElement('div');
      reply.className = 'm-chat-msg-reply' + (msg.replyToDeleted ? ' deleted' : '');
      if (msg.replyToDeleted) {
        reply.innerHTML = '<span>Message supprimé</span>';
      } else {
        reply.innerHTML = '<strong>' + escapeHtml(msg.replyToAuthor) + '</strong><span>' + escapeHtml(mChatSnippet(msg.replyToText, 50)) + '</span>';
        reply.addEventListener('click', () => {
          const target = document.getElementById('m-chat-msg-' + msg.replyToId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }
      col.appendChild(reply);
    }

    const body = document.createElement('div');
    body.className = 'm-chat-msg-text';
    body.innerHTML = renderMarkdown(msg.text);
    col.appendChild(body);

    el.appendChild(col);
    return el;
  }

  function mRenderChatMessages(forceScroll) {
    const container = document.getElementById('mChatMessages');
    if (!container) return;
    container.innerHTML = '';
    const all = _mChatMessages.concat(_mChatPendingSends);
    if (!all.length) {
      container.innerHTML = '<div class="m-chat-empty">Aucun message pour le moment. Lance la discussion !</div>';
    } else {
      all.forEach(msg => container.appendChild(mBuildChatMessageEl(msg)));
      if (forceScroll || _mChatAtBottom) container.scrollTop = container.scrollHeight;
    }
    // Réancrage après rendu : le panneau est ancré par son `top` en px, sinon
    // chaque message le fait grandir vers le bas et déborder l'écran.
    if (_mChatPanelOpen) requestAnimationFrame(mPositionChatPanel);
  }

  function mSetChatReplyTo(msg) {
    _mChatReplyTo = { id: msg.id, author: msg.author, text: msg.text };
    document.getElementById('mChatReplyBannerAuthor').textContent = msg.author;
    document.getElementById('mChatReplyBannerSnippet').textContent = mChatSnippet(msg.text, 70);
    document.getElementById('mChatReplyBanner').style.display = 'flex';
    document.getElementById('mChatInput').focus();
  }

  function mClearChatReplyTo() {
    _mChatReplyTo = null;
    document.getElementById('mChatReplyBanner').style.display = 'none';
  }

  function mUpdateChatBadge() {
    const badge = document.getElementById('mChatFabBadge');
    if (!badge) return;
    if (_mChatUnreadCount > 0) {
      badge.textContent = _mChatUnreadCount > 99 ? '99+' : String(_mChatUnreadCount);
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function mPositionChatPanel() {
    const fab = document.getElementById('mChatFab');
    const panel = document.getElementById('mChatPanel');
    if (!fab || !panel || panel.style.display === 'none') return;
    const fr = fab.getBoundingClientRect();
    const pw = panel.offsetWidth, ph = panel.offsetHeight;
    let left = fr.left + fr.width / 2 - pw / 2;
    let top  = fr.top - ph - 20;
    if (top < 8) top = fr.bottom + 20;
    // Math.max en dernier : sur un petit viewport la borne haute peut être
    // négative, et l'ancien ordre poussait le panneau hors écran.
    left = Math.max(8, Math.min(left, window.innerWidth  - pw - 8));
    top  = Math.max(8, Math.min(top,  window.innerHeight - ph - 8));
    panel.style.left = left + 'px';
    panel.style.top  = top  + 'px';
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';
  }

  function mOpenChatPanel() {
    _mChatPanelOpen = true;
    document.getElementById('mChatPanel').style.display = 'flex';
    mPositionChatPanel();
    _mChatUnreadCount = 0;
    mUpdateChatBadge();
    if (!_mChatLoadedOnce) mLoadChat(); else { mRenderChatMessages(true); mPollChat(); }
    mScheduleChatPoll();
  }

  function mCloseChatPanel() {
    _mChatPanelOpen = false;
    document.getElementById('mChatPanel').style.display = 'none';
    mScheduleChatPoll();
  }

  function mToggleChatPanel() {
    if (_mChatPanelOpen) mCloseChatPanel(); else mOpenChatPanel();
  }

  function mLoadChat() {
    callServer('apiGetChatMessages', [], res => {
      _mChatMessages = res.messages || [];
      _mChatLoadedOnce = true;
      mRenderChatMessages(true);
    }, 'Chargement du tchat');
  }

  // Sondage adaptatif : rapide quand le panneau est ouvert (conversation en
  // cours), lent quand il est fermé (juste le badge de non-lus à tenir à jour).
  function mScheduleChatPoll() {
    if (_mChatPollTimer) clearInterval(_mChatPollTimer);
    _mChatPollTimer = setInterval(mPollChat, _mChatPanelOpen ? 2000 : 8000);
  }

  let _mChatPollInFlight = false;
  function mPollChat() {
    if (_mChatPollInFlight) return;
    _mChatPollInFlight = true;
    callServer('apiGetChatMessages', [], res => {
      _mChatPollInFlight = false;
      const fresh = res.messages || [];
      const prevLastId = _mChatMessages.length ? _mChatMessages[_mChatMessages.length - 1].id : null;
      const newCount = fresh.length - _mChatMessages.length;
      const changed = fresh.length !== _mChatMessages.length ||
        (fresh.length && prevLastId !== fresh[fresh.length - 1].id);
      if (!changed) return;
      _mChatMessages = fresh;
      if (_mChatPanelOpen) {
        mRenderChatMessages(false);
      } else if (newCount > 0) {
        _mChatUnreadCount += newCount;
      }
      mUpdateChatBadge();
    }, 'Actualisation du tchat', () => { _mChatPollInFlight = false; });
  }

  // Envoi optimiste : le message apparaît immédiatement (grisé, horloge) sans
  // attendre le serveur ; en cas d'échec il est retiré et le texte restauré.
  function mSendChatMessage() {
    if (!requireIdentity()) return;
    const input = document.getElementById('mChatInput');
    const text = input.value.trim();
    if (!text) return;
    const replyTo = _mChatReplyTo;
    const temp = {
      id: 'pending-' + Date.now(),
      author: _whoAmI, text, timestamp: new Date().toISOString(),
      replyToId: replyTo ? replyTo.id : '',
      replyToAuthor: replyTo ? replyTo.author : '',
      replyToText: replyTo ? replyTo.text : '',
      pending: true
    };
    _mChatPendingSends.push(temp);
    input.value = '';
    if (_mChatInputFit) _mChatInputFit(); // reset la hauteur du textarea après envoi
    mClearChatReplyTo();
    mRenderChatMessages(true);
    callServer('apiPostChatMessage', [text, temp.replyToId, _whoAmI || ''], () => {
      _mChatPendingSends = _mChatPendingSends.filter(m => m.id !== temp.id);
      mLoadChat();
    }, 'Envoi du message', () => {
      _mChatPendingSends = _mChatPendingSends.filter(m => m.id !== temp.id);
      input.value = text;
      if (replyTo) mSetChatReplyTo({ id: replyTo.id, author: replyTo.author, text: replyTo.text });
      mRenderChatMessages(false);
    });
  }

  function initChatFabDragMobile(fab) {
    let dragging = false, moved = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
    const DRAG_THRESHOLD = 10;

    function setPos(left, top) {
      const maxLeft = window.innerWidth  - fab.offsetWidth  - 8;
      const maxTop  = window.innerHeight - fab.offsetHeight - 8;
      left = Math.max(8, Math.min(left, maxLeft));
      top  = Math.max(8, Math.min(top,  maxTop));
      fab.style.left = left + 'px';
      fab.style.top  = top  + 'px';
      fab.style.right = 'auto';
      fab.style.bottom = 'auto';
      mPositionChatPanel();
    }

    fab.addEventListener('pointerdown', e => {
      dragging = true; moved = false;
      const rect = fab.getBoundingClientRect();
      startX = e.clientX; startY = e.clientY;
      startLeft = rect.left; startTop = rect.top;
      fab.setPointerCapture(e.pointerId);
    });
    fab.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) moved = true;
      if (moved) setPos(startLeft + dx, startTop + dy);
    });
    function endDrag() {
      if (!dragging) return;
      dragging = false;
      if (moved) {
        const rect = fab.getBoundingClientRect();
        try { localStorage.setItem(M_CHAT_FAB_POS_KEY, JSON.stringify({ left: rect.left, top: rect.top })); } catch {}
      }
    }
    fab.addEventListener('pointerup', endDrag);
    fab.addEventListener('pointercancel', endDrag);
    fab.addEventListener('click', () => {
      if (moved) { moved = false; return; }
      mToggleChatPanel();
    });

    try {
      const saved = JSON.parse(localStorage.getItem(M_CHAT_FAB_POS_KEY) || 'null');
      if (saved) setPos(saved.left, saved.top);
    } catch {}
    window.addEventListener('resize', () => {
      const rect = fab.getBoundingClientRect();
      setPos(rect.left, rect.top);
    });
  }

  // La hauteur des zones de texte suit le contenu, bornée à une fraction de
  // l'écran : plus besoin de scroller dans une petite boîte, et la boîte ne
  // peut jamais dépasser l'écran.
  function autoGrowTextarea(ta, maxVhRatio) {
    const fit = () => {
      const max = Math.round(window.innerHeight * (maxVhRatio || 0.4));
      ta.style.height = 'auto';
      const wanted = ta.scrollHeight + 2;
      ta.style.height = Math.min(wanted, max) + 'px';
      ta.style.overflowY = wanted > max ? 'auto' : 'hidden';
    };
    ta.addEventListener('input', fit);
    ta.addEventListener('focus', fit);
    window.addEventListener('resize', fit);
    requestAnimationFrame(fit); // premier ajustement une fois posé dans le DOM
    return fit;
  }

  function initChatWidgetMobile() {
    const fab = document.getElementById('mChatFab');
    if (!fab) return;
    initChatFabDragMobile(fab);
    _mChatInputFit = autoGrowTextarea(document.getElementById('mChatInput'), 0.3);
    document.getElementById('mChatPanelClose').addEventListener('click', mCloseChatPanel);
    document.getElementById('mChatSendBtn').addEventListener('click', mSendChatMessage);
    document.getElementById('mChatReplyBannerCancel').addEventListener('click', mClearChatReplyTo);
    document.getElementById('mChatMessages').addEventListener('scroll', function() {
      _mChatAtBottom = (this.scrollHeight - this.scrollTop - this.clientHeight) < 80;
    });

    mLoadChat();
    mScheduleChatPoll();
  }

  // ── INIT ──────────────────────────────────────────────────────────────
  document.getElementById('mSideToggle').addEventListener('click', () => {
    document.getElementById('mSideNav').classList.toggle('expanded');
  });
  document.getElementById('mSideOverlay').addEventListener('click', collapseSideNav);

  // Filet de sécurité pour la bulle du graphique : sur tactile, aucun événement
  // ne signale qu'on est sorti du graphique (pas de mouseleave). Un tap ou un
  // déplacement de souris ailleurs sur la page doit fermer la bulle si elle
  // n'était pas déjà refermée par Chart.js.
  function hideMobileChartTooltipIfOutside(x, y) {
    const el = document.getElementById('mChartCustomTooltip');
    if (!el || !el.classList.contains('visible')) return;
    const canvas = document.getElementById('mMainChart');
    if (!canvas) return;
    const cRect = canvas.getBoundingClientRect();
    const tRect = el.getBoundingClientRect();
    const inCanvas  = x >= cRect.left && x <= cRect.right && y >= cRect.top && y <= cRect.bottom;
    const inTooltip = x >= tRect.left && x <= tRect.right && y >= tRect.top && y <= tRect.bottom;
    if (!inCanvas && !inTooltip) el.classList.remove('visible');
  }
  document.addEventListener('mousemove', e => hideMobileChartTooltipIfOutside(e.clientX, e.clientY));
  document.addEventListener('mouseleave', () => {
    const el = document.getElementById('mChartCustomTooltip');
    if (el) el.classList.remove('visible');
  });
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (t) hideMobileChartTooltipIfOutside(t.clientX, t.clientY);
  }, { passive: true });

  window.addEventListener('DOMContentLoaded', () => {
    initTheme();
    loadAppBranding();
    callServer('apiGetNavPages', [], res => {
      NAV_PAGES = res.pages;
      renderSideNav();
      loadEntities(() => {
        goToTab('tab-dashboard');
        loadNotesCountBadge();
        initChatWidgetMobile();
      });
    }, 'Chargement du menu');
  });
</script>
